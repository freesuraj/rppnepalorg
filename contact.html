<!doctype html>
<html lang="ne">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact Us | National Transparency Party Nepal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Anek+Devanagari:wght@400;500;600;700;800&family=Noto+Serif+Devanagari:wght@600;700&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="assets/css/styles.css">
    <script src="assets/js/site-config.js" defer></script>
    <script src="assets/js/site-content.js" defer></script>
    <script src="assets/js/site.js" defer></script>
  </head>
  <body data-page="contact" data-page-title="pages.contact">
    <header class="site-header">
      <div class="shell header-row">
        <a class="brand" href="index.html" aria-label="National Transparency Party Nepal">
          <span class="brand-mark">NTP</span>
          <span class="brand-text">
            <strong data-i18n="brand.short"></strong>
            <small data-i18n="brand.long"></small>
          </span>
        </a>

        <button
          class="nav-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="site-nav"
          data-nav-toggle
        >
          <span></span>
          <span></span>
        </button>

        <nav class="site-nav" id="site-nav" aria-label="Primary">
          <a href="index.html" data-i18n="nav.home"></a>
          <a href="mission.html" data-i18n="nav.mission"></a>
          <a href="join.html" data-i18n="nav.join"></a>
          <a href="donation.html" data-i18n="nav.donation"></a>
          <a href="contact.html" data-i18n="nav.contact"></a>
        </nav>

        <div class="language-switch" aria-label="Language switcher">
          <button type="button" data-lang-switch="ne">नेपाली</button>
          <button type="button" data-lang-switch="en">English</button>
        </div>
      </div>
    </header>

    <main>
      <section class="page-hero">
        <div class="shell page-hero-shell">
          <span class="eyebrow" data-i18n="contact.hero.kicker"></span>
          <h1 data-i18n="contact.hero.title"></h1>
          <p data-i18n="contact.hero.description"></p>
        </div>
      </section>

      <section class="section">
        <div class="shell contact-grid">
          <div class="detail-panel">
            <div class="section-heading compact">
              <span class="eyebrow" data-i18n="contact.methods.kicker"></span>
              <h2 data-i18n="contact.methods.title"></h2>
              <p data-i18n="contact.methods.description"></p>
            </div>

            <div class="detail-list">
              <article class="detail-item">
                <span data-i18n="contact.labels.email"></span>
                <a href="#" data-config="organization.email" data-config-type="email"></a>
              </article>
              <article class="detail-item">
                <span data-i18n="contact.labels.phone"></span>
                <a href="#" data-config="organization.phone" data-config-type="tel"></a>
              </article>
              <article class="detail-item">
                <span data-i18n="contact.labels.address"></span>
                <p data-config="organization.address"></p>
              </article>
            </div>
          </div>

          <aside class="contact-sidebar">
            <article class="info-card">
              <h3 data-i18n="contact.expect.title"></h3>
              <p data-i18n="contact.expect.description"></p>
              <div class="mini-list">
                <div>
                  <strong data-i18n="contact.expect.pointOneTitle"></strong>
                  <p data-i18n="contact.expect.pointOneDescription"></p>
                </div>
                <div>
                  <strong data-i18n="contact.expect.pointTwoTitle"></strong>
                  <p data-i18n="contact.expect.pointTwoDescription"></p>
                </div>
                <div>
                  <strong data-i18n="contact.expect.pointThreeTitle"></strong>
                  <p data-i18n="contact.expect.pointThreeDescription"></p>
                </div>
              </div>
            </article>

            <article class="info-card info-card-accent">
              <h3 data-i18n="contact.socialTitle"></h3>
              <div class="social-grid">
                <a href="#" data-config="organization.social.facebook" data-config-type="url">Facebook</a>
                <a href="#" data-config="organization.social.instagram" data-config-type="url">Instagram</a>
                <a href="#" data-config="organization.social.tiktok" data-config-type="url">TikTok</a>
                <a href="#" data-config="organization.social.x" data-config-type="url">X</a>
              </div>
            </article>
          </aside>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="shell footer-grid">
        <div>
          <h2 data-i18n="brand.long"></h2>
          <p data-i18n="footer.tagline"></p>
        </div>

        <div>
          <h3 data-i18n="footer.quickLinksTitle"></h3>
          <ul class="footer-links">
            <li><a href="mission.html" data-i18n="nav.mission"></a></li>
            <li><a href="join.html" data-i18n="nav.join"></a></li>
            <li><a href="donation.html" data-i18n="nav.donation"></a></li>
            <li><a href="contact.html" data-i18n="nav.contact"></a></li>
          </ul>
        </div>

        <div>
          <h3 data-i18n="footer.contactTitle"></h3>
          <ul class="footer-links footer-links-compact">
            <li>
              <a href="#" data-config="organization.email" data-config-type="email"></a>
            </li>
            <li>
              <a href="#" data-config="organization.phone" data-config-type="tel"></a>
            </li>
            <li>
              <span data-config="organization.address"></span>
            </li>
          </ul>
        </div>
      </div>
    </footer>
  </body>
</html>
