<!doctype html>
<html lang="ne">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Donation | National Transparency Party Nepal</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="apple-touch-icon" href="assets/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Anek+Devanagari:wght@400;500;600;700;800&family=Noto+Serif+Devanagari:wght@600;700&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="assets/css/styles.css">
    <script src="assets/js/site-config.js" defer></script>
    <script src="assets/js/site-content.js" defer></script>
    <script src="assets/js/site.js" defer></script>
  </head>
  <body data-page="donation" data-page-title="pages.donation">
    <header class="site-header">
      <div class="shell header-row">
        <a class="brand" href="index.html" aria-label="National Transparency Party Nepal">
          <img class="brand-mark" src="assets/logo.png" alt="" width="1024" height="1024">
          <span class="brand-text">
            <strong data-i18n="brand.short"></strong>
            <small data-i18n="brand.long"></small>
          </span>
        </a>

        <button
          class="nav-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="site-nav"
          data-nav-toggle
        >
          <span></span>
          <span></span>
        </button>

        <nav class="site-nav" id="site-nav" aria-label="Primary">
          <a href="index.html" data-i18n="nav.home"></a>
          <a href="mission.html" data-i18n="nav.mission"></a>
          <a href="join.html" data-i18n="nav.join"></a>
          <a href="donation.html" data-i18n="nav.donation"></a>
          <a href="contact.html" data-i18n="nav.contact"></a>
        </nav>

        <div class="language-switch" aria-label="Language switcher">
          <button type="button" data-lang-switch="ne">नेपाली</button>
          <button type="button" data-lang-switch="en">English</button>
        </div>
      </div>
    </header>

    <main>
      <section class="page-hero">
        <div class="shell page-hero-shell">
          <span class="eyebrow" data-i18n="donation.hero.kicker"></span>
          <h1 data-i18n="donation.hero.title"></h1>
          <p data-i18n="donation.hero.description"></p>
        </div>
      </section>

      <section class="section">
        <div class="shell">
          <div class="section-heading compact">
            <span class="eyebrow" data-i18n="donation.impact.kicker"></span>
            <h2 data-i18n="donation.impact.title"></h2>
          </div>

          <div class="card-grid">
            <article class="info-card">
              <span class="card-badge">01</span>
              <h3 data-i18n="donation.impact.cardOneTitle"></h3>
              <p data-i18n="donation.impact.cardOneDescription"></p>
            </article>
            <article class="info-card">
              <span class="card-badge">02</span>
              <h3 data-i18n="donation.impact.cardTwoTitle"></h3>
              <p data-i18n="donation.impact.cardTwoDescription"></p>
            </article>
            <article class="info-card">
              <span class="card-badge">03</span>
              <h3 data-i18n="donation.impact.cardThreeTitle"></h3>
              <p data-i18n="donation.impact.cardThreeDescription"></p>
            </article>
          </div>
        </div>
      </section>

      <section class="section section-soft">
        <div class="shell">
          <div class="section-heading compact">
            <span class="eyebrow" data-i18n="donation.methods.kicker"></span>
            <h2 data-i18n="donation.methods.title"></h2>
            <p data-i18n="donation.methods.description"></p>
          </div>

          <div class="card-grid">
            <article class="info-card">
              <h3 data-i18n="donation.methods.esewaTitle"></h3>
              <p data-config="donation.esewaId"></p>
            </article>
            <article class="info-card">
              <h3 data-i18n="donation.methods.khaltiTitle"></h3>
              <p data-config="donation.khaltiId"></p>
            </article>
            <article class="info-card">
              <h3 data-i18n="donation.methods.bankTitle"></h3>
              <div class="mini-list">
                <div>
                  <strong data-i18n="donation.methods.bankNameLabel"></strong>
                  <p data-config="donation.bankName"></p>
                </div>
                <div>
                  <strong data-i18n="donation.methods.bankAccountLabel"></strong>
                  <p data-config="donation.bankAccountNumber"></p>
                </div>
                <div>
                  <strong data-i18n="donation.methods.bankHolderLabel"></strong>
                  <p data-config="donation.bankAccountName"></p>
                </div>
              </div>
            </article>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="shell promise-panel">
          <div class="section-heading compact">
            <span class="eyebrow" data-i18n="donation.promise.kicker"></span>
            <h2 data-i18n="donation.promise.title"></h2>
            <p data-i18n="donation.promise.description"></p>
          </div>

          <div class="promise-grid">
            <article class="pledge-card">
              <h3 data-i18n="donation.promise.pointOneTitle"></h3>
              <p data-i18n="donation.promise.pointOneDescription"></p>
            </article>
            <article class="pledge-card">
              <h3 data-i18n="donation.promise.pointTwoTitle"></h3>
              <p data-i18n="donation.promise.pointTwoDescription"></p>
            </article>
            <article class="pledge-card">
              <h3 data-i18n="donation.promise.pointThreeTitle"></h3>
              <p data-i18n="donation.promise.pointThreeDescription"></p>
            </article>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="shell callout-banner">
          <div>
            <span class="eyebrow" data-i18n="donation.contactCta.kicker"></span>
            <h2 data-i18n="donation.contactCta.title"></h2>
            <p data-i18n="donation.contactCta.description"></p>
          </div>
          <a class="button button-secondary" href="contact.html" data-i18n="actions.contact"></a>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="shell footer-grid">
        <div>
          <h2 data-i18n="brand.long"></h2>
          <p data-i18n="footer.tagline"></p>
        </div>

        <div>
          <h3 data-i18n="footer.quickLinksTitle"></h3>
          <ul class="footer-links">
            <li><a href="mission.html" data-i18n="nav.mission"></a></li>
            <li><a href="join.html" data-i18n="nav.join"></a></li>
            <li><a href="donation.html" data-i18n="nav.donation"></a></li>
            <li><a href="contact.html" data-i18n="nav.contact"></a></li>
          </ul>
        </div>

        <div>
          <h3 data-i18n="footer.contactTitle"></h3>
          <ul class="footer-links footer-links-compact">
            <li>
              <a href="#" data-config="organization.email" data-config-type="email"></a>
            </li>
            <li>
              <a href="#" data-config="organization.phone" data-config-type="tel"></a>
            </li>
            <li>
              <span data-config="organization.address"></span>
            </li>
          </ul>
        </div>
      </div>
    </footer>
  </body>
</html>
