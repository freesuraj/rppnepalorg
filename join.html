<!doctype html>
<html lang="ne">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Join the Movement | National Transparency Party Nepal</title>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
    <link rel="shortcut icon" href="favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Anek+Devanagari:wght@400;500;600;700;800&family=Noto+Serif+Devanagari:wght@600;700&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="assets/css/styles.css">
    <script src="assets/js/site-config.js" defer></script>
    <script src="assets/js/site.js" defer></script>
    <script src="assets/js/join.js" defer></script>
  </head>
  <body data-page="join" data-page-title="pages.join">
    <header class="site-header">
      <div class="shell header-row">
        <a class="brand" href="index.html" aria-label="National Transparency Party Nepal">
          <img class="brand-mark" src="assets/logo.png" alt="" width="1024" height="1024">
          <span class="brand-text">
            <strong data-i18n="brand.short"></strong>
            <small data-i18n="brand.long"></small>
          </span>
        </a>

        <button
          class="nav-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="site-nav"
          data-nav-toggle
        >
          <span></span>
          <span></span>
        </button>

        <div class="menu-panel">
          <nav class="site-nav" id="site-nav" aria-label="Primary">
            <a href="index.html" data-i18n="nav.home"></a>
            <a href="mission.html" data-i18n="nav.mission"></a>
            <a href="join.html" data-i18n="nav.join"></a>
            <a href="donation.html" data-i18n="nav.donation"></a>
            <a href="contact.html" data-i18n="nav.contact"></a>
          </nav>

          <div class="language-switch" aria-label="Language switcher">
            <button type="button" data-lang-switch="ne">नेपाली</button>
            <button type="button" data-lang-switch="en">English</button>
          </div>
        </div>
      </div>
    </header>

    <main>
      <section class="page-hero">
        <div class="shell page-hero-shell">
          <span class="eyebrow" data-i18n="join.hero.kicker"></span>
          <h1 data-i18n="join.hero.title"></h1>
          <p data-i18n="join.hero.description"></p>
        </div>
      </section>

      <section class="section section-soft">
        <div class="shell form-shell form-shell-priority">
          <div class="form-stack">
            <div class="section-heading compact">
              <span class="eyebrow" data-i18n="join.form.kicker"></span>
              <h2 data-i18n="join.form.title"></h2>
              <p data-i18n="join.form.description"></p>
            </div>

            <form class="join-form" id="join-form" novalidate>
              <input type="hidden" name="website" autocomplete="off" tabindex="-1">

              <div class="field-grid">
                <label class="field">
                  <span data-i18n="join.form.nameLabel"></span>
                  <input
                    type="text"
                    name="full_name"
                    required
                    maxlength="120"
                    autocomplete="name"
                    data-i18n-placeholder="join.form.namePlaceholder"
                  >
                </label>

                <label class="field">
                  <span data-i18n="join.form.emailLabel"></span>
                  <input
                    type="email"
                    name="email"
                    required
                    maxlength="255"
                    autocomplete="email"
                    data-i18n-placeholder="join.form.emailPlaceholder"
                  >
                </label>

                <label class="field">
                  <span data-i18n="join.form.phoneLabel"></span>
                  <input
                    type="tel"
                    name="phone"
                    required
                    maxlength="40"
                    autocomplete="tel"
                    inputmode="tel"
                    data-i18n-placeholder="join.form.phonePlaceholder"
                  >
                </label>

                <label class="field">
                  <span data-i18n="join.form.tiktokLabel"></span>
                  <input
                    type="url"
                    name="tiktok"
                    maxlength="255"
                    autocomplete="url"
                    data-i18n-placeholder="join.form.tiktokPlaceholder"
                  >
                </label>

                <label class="field">
                  <span data-i18n="join.form.instagramLabel"></span>
                  <input
                    type="url"
                    name="instagram"
                    maxlength="255"
                    autocomplete="url"
                    data-i18n-placeholder="join.form.instagramPlaceholder"
                  >
                </label>

                <label class="field">
                  <span data-i18n="join.form.facebookLabel"></span>
                  <input
                    type="url"
                    name="facebook"
                    maxlength="255"
                    autocomplete="url"
                    data-i18n-placeholder="join.form.facebookPlaceholder"
                  >
                </label>

                <label class="field">
                  <span data-i18n="join.form.xLabel"></span>
                  <input
                    type="url"
                    name="x_profile"
                    maxlength="255"
                    autocomplete="url"
                    data-i18n-placeholder="join.form.xPlaceholder"
                  >
                </label>
              </div>

            <label class="consent-row">
              <input type="checkbox" name="consent" required checked>
              <span data-i18n="join.form.consent"></span>
            </label>

              <div class="form-actions">
                <button class="button button-primary" type="submit" data-i18n="join.form.submit"></button>
                <p class="form-note" data-i18n="join.form.privacy"></p>
              </div>

              <p class="status-message" id="form-status" role="status" aria-live="polite"></p>
            </form>

          </div>

          <aside class="info-card form-note-card bullet-panel">
            <h3 data-i18n="join.benefits.title"></h3>
            <ul class="bullet-list">
              <li>
                <strong data-i18n="join.benefits.cardOneTitle"></strong>
                <p data-i18n="join.benefits.cardOneDescription"></p>
              </li>
              <li>
                <strong data-i18n="join.benefits.cardTwoTitle"></strong>
                <p data-i18n="join.benefits.cardTwoDescription"></p>
              </li>
              <li>
                <strong data-i18n="join.benefits.cardThreeTitle"></strong>
                <p data-i18n="join.benefits.cardThreeDescription"></p>
              </li>
            </ul>
            <div class="panel-divider" aria-hidden="true"></div>
            <h3 data-i18n="join.sidecard.title"></h3>
            <p data-i18n="join.sidecard.description"></p>
            <ul class="bullet-list">
              <li>
                <strong data-i18n="join.sidecard.pointOneTitle"></strong>
                <p data-i18n="join.sidecard.pointOneDescription"></p>
              </li>
              <li>
                <strong data-i18n="join.sidecard.pointTwoTitle"></strong>
                <p data-i18n="join.sidecard.pointTwoDescription"></p>
              </li>
              <li>
                <strong data-i18n="join.sidecard.pointThreeTitle"></strong>
                <p data-i18n="join.sidecard.pointThreeDescription"></p>
              </li>
            </ul>
          </aside>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="shell footer-grid">
        <div>
          <h2 data-i18n="brand.long"></h2>
          <p data-i18n="footer.tagline"></p>
        </div>

        <div>
          <h3 data-i18n="footer.quickLinksTitle"></h3>
          <ul class="footer-links">
            <li><a href="mission.html" data-i18n="nav.mission"></a></li>
            <li><a href="join.html" data-i18n="nav.join"></a></li>
            <li><a href="donation.html" data-i18n="nav.donation"></a></li>
            <li><a href="contact.html" data-i18n="nav.contact"></a></li>
          </ul>
        </div>

        <div>
          <h3 data-i18n="footer.contactTitle"></h3>
          <ul class="footer-links footer-links-compact">
            <li>
              <a href="#" data-config="organization.email" data-config-type="email"></a>
            </li>
            <li>
              <a href="#" data-config="organization.phone" data-config-type="tel"></a>
            </li>
            <li>
              <span data-config="organization.address"></span>
            </li>
          </ul>
          <h3 class="footer-subheading" data-i18n="footer.socialTitle"></h3>
          <ul class="footer-links footer-links-compact">
            <li><a href="#" data-config="organization.social.facebook" data-config-type="url">Facebook</a></li>
            <li><a href="#" data-config="organization.social.instagram" data-config-type="url">Instagram</a></li>
            <li><a href="#" data-config="organization.social.tiktok" data-config-type="url">TikTok</a></li>
            <li><a href="#" data-config="organization.social.x" data-config-type="url">X</a></li>
          </ul>
        </div>
      </div>
    </footer>
  </body>
</html>
