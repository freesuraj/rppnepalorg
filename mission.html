<!doctype html>
<html lang="ne">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Our Mission | National Transparency Party Nepal</title>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
    <link rel="shortcut icon" href="favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Anek+Devanagari:wght@400;500;600;700;800&family=Noto+Serif+Devanagari:wght@600;700&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="assets/css/styles.css">
    <script src="assets/js/site-config.js" defer></script>
    <script src="assets/js/site.js" defer></script>
  </head>
  <body data-page="mission" data-page-title="pages.mission">
    <header class="site-header">
      <div class="shell header-row">
        <a class="brand" href="index.html" aria-label="National Transparency Party Nepal">
          <img class="brand-mark" src="assets/logo.png" alt="" width="1024" height="1024">
          <span class="brand-text">
            <strong data-i18n="brand.short"></strong>
            <small data-i18n="brand.long"></small>
          </span>
        </a>

        <button
          class="nav-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="site-nav"
          data-nav-toggle
        >
          <span></span>
          <span></span>
        </button>

        <nav class="site-nav" id="site-nav" aria-label="Primary">
          <a href="index.html" data-i18n="nav.home"></a>
          <a href="mission.html" data-i18n="nav.mission"></a>
          <a href="join.html" data-i18n="nav.join"></a>
          <a href="donation.html" data-i18n="nav.donation"></a>
          <a href="contact.html" data-i18n="nav.contact"></a>
        </nav>

        <div class="language-switch" aria-label="Language switcher">
          <button type="button" data-lang-switch="ne">नेपाली</button>
          <button type="button" data-lang-switch="en">English</button>
        </div>
      </div>
    </header>

    <main>
      <section class="page-hero">
        <div class="shell page-hero-shell">
          <span class="eyebrow" data-i18n="mission.hero.kicker"></span>
          <h1 data-i18n="mission.hero.title"></h1>
          <p data-i18n="mission.hero.description"></p>
        </div>
      </section>

      <section class="section">
        <div class="shell">
          <div class="section-heading compact">
            <span class="eyebrow" data-i18n="mission.values.kicker"></span>
            <h2 data-i18n="mission.values.title"></h2>
          </div>

          <div class="card-grid card-grid-wide">
            <article class="info-card">
              <span class="card-badge">01</span>
              <h3 data-i18n="mission.values.cardOneTitle"></h3>
              <p data-i18n="mission.values.cardOneDescription"></p>
            </article>
            <article class="info-card">
              <span class="card-badge">02</span>
              <h3 data-i18n="mission.values.cardTwoTitle"></h3>
              <p data-i18n="mission.values.cardTwoDescription"></p>
            </article>
            <article class="info-card">
              <span class="card-badge">03</span>
              <h3 data-i18n="mission.values.cardThreeTitle"></h3>
              <p data-i18n="mission.values.cardThreeDescription"></p>
            </article>
            <article class="info-card">
              <span class="card-badge">04</span>
              <h3 data-i18n="mission.values.cardFourTitle"></h3>
              <p data-i18n="mission.values.cardFourDescription"></p>
            </article>
          </div>
        </div>
      </section>

      <section class="section section-soft">
        <div class="shell promise-panel">
          <div class="section-heading compact">
            <span class="eyebrow" data-i18n="mission.charter.kicker"></span>
            <h2 data-i18n="mission.charter.title"></h2>
            <p data-i18n="mission.charter.description"></p>
          </div>

          <div class="promise-grid">
            <article class="pledge-card">
              <h3 data-i18n="mission.charter.pointOneTitle"></h3>
              <p data-i18n="mission.charter.pointOneDescription"></p>
            </article>
            <article class="pledge-card">
              <h3 data-i18n="mission.charter.pointTwoTitle"></h3>
              <p data-i18n="mission.charter.pointTwoDescription"></p>
            </article>
            <article class="pledge-card">
              <h3 data-i18n="mission.charter.pointThreeTitle"></h3>
              <p data-i18n="mission.charter.pointThreeDescription"></p>
            </article>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="shell">
          <div class="section-heading compact">
            <span class="eyebrow" data-i18n="mission.timeline.kicker"></span>
            <h2 data-i18n="mission.timeline.title"></h2>
          </div>

          <div class="timeline timeline-extended">
            <article class="timeline-step">
              <span class="timeline-index">01</span>
              <h3 data-i18n="mission.timeline.stepOneTitle"></h3>
              <p data-i18n="mission.timeline.stepOneDescription"></p>
            </article>
            <article class="timeline-step">
              <span class="timeline-index">02</span>
              <h3 data-i18n="mission.timeline.stepTwoTitle"></h3>
              <p data-i18n="mission.timeline.stepTwoDescription"></p>
            </article>
            <article class="timeline-step">
              <span class="timeline-index">03</span>
              <h3 data-i18n="mission.timeline.stepThreeTitle"></h3>
              <p data-i18n="mission.timeline.stepThreeDescription"></p>
            </article>
            <article class="timeline-step">
              <span class="timeline-index">04</span>
              <h3 data-i18n="mission.timeline.stepFourTitle"></h3>
              <p data-i18n="mission.timeline.stepFourDescription"></p>
            </article>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="shell callout-banner">
          <div>
            <span class="eyebrow" data-i18n="mission.outro.kicker"></span>
            <h2 data-i18n="mission.outro.title"></h2>
            <p data-i18n="mission.outro.description"></p>
          </div>
          <a class="button button-primary" href="join.html" data-i18n="actions.join"></a>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="shell footer-grid">
        <div>
          <h2 data-i18n="brand.long"></h2>
          <p data-i18n="footer.tagline"></p>
        </div>

        <div>
          <h3 data-i18n="footer.quickLinksTitle"></h3>
          <ul class="footer-links">
            <li><a href="mission.html" data-i18n="nav.mission"></a></li>
            <li><a href="join.html" data-i18n="nav.join"></a></li>
            <li><a href="donation.html" data-i18n="nav.donation"></a></li>
            <li><a href="contact.html" data-i18n="nav.contact"></a></li>
          </ul>
        </div>

        <div>
          <h3 data-i18n="footer.contactTitle"></h3>
          <ul class="footer-links footer-links-compact">
            <li>
              <a href="#" data-config="organization.email" data-config-type="email"></a>
            </li>
            <li>
              <a href="#" data-config="organization.phone" data-config-type="tel"></a>
            </li>
            <li>
              <span data-config="organization.address"></span>
            </li>
          </ul>
        </div>
      </div>
    </footer>
  </body>
</html>
