<!doctype html>
<html lang="ne">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>National Transparency Party Nepal</title>
    <meta
      name="description"
      content="National Transparency Party Nepal: a civic movement for transparent governance, public accountability, and citizen-led reform."
    >
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
    <link rel="shortcut icon" href="favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Anek+Devanagari:wght@400;500;600;700;800&family=Noto+Serif+Devanagari:wght@600;700&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="assets/css/styles.css">
    <script src="assets/js/site-config.js" defer></script>
    <script src="assets/js/site.js" defer></script>
  </head>
  <body data-page="home" data-page-title="pages.home">
    <header class="site-header">
      <div class="shell header-row">
        <a class="brand" href="index.html" aria-label="National Transparency Party Nepal">
          <img class="brand-mark" src="assets/logo.png" alt="" width="1024" height="1024">
          <span class="brand-text">
            <strong data-i18n="brand.short"></strong>
            <small data-i18n="brand.long"></small>
          </span>
        </a>

        <button
          class="nav-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="site-nav"
          data-nav-toggle
        >
          <span></span>
          <span></span>
        </button>

        <div class="menu-panel">
          <nav class="site-nav" id="site-nav" aria-label="Primary">
            <a href="index.html" data-i18n="nav.home"></a>
            <a href="mission.html" data-i18n="nav.mission"></a>
            <a href="join.html" data-i18n="nav.join"></a>
            <a href="donation.html" data-i18n="nav.donation"></a>
            <a href="contact.html" data-i18n="nav.contact"></a>
          </nav>

          <div class="language-switch" aria-label="Language switcher">
            <button type="button" data-lang-switch="ne">नेपाली</button>
            <button type="button" data-lang-switch="en">English</button>
          </div>
        </div>
      </div>
    </header>

    <main>
      <section class="hero hero-home">
        <div class="shell hero-grid">
          <div class="hero-copy">
            <span class="eyebrow" data-i18n="home.hero.kicker"></span>
            <h1 data-i18n="home.hero.title"></h1>
            <p class="hero-text" data-i18n="home.hero.description"></p>
            <div class="button-row">
              <a class="button button-primary" href="join.html" data-i18n="actions.join"></a>
              <a class="button button-secondary" href="mission.html" data-i18n="actions.mission"></a>
            </div>

            <div class="stat-grid">
              <article class="stat-card">
                <strong data-i18n="home.hero.statOneValue"></strong>
                <span data-i18n="home.hero.statOneLabel"></span>
              </article>
              <article class="stat-card">
                <strong data-i18n="home.hero.statTwoValue"></strong>
                <span data-i18n="home.hero.statTwoLabel"></span>
              </article>
              <article class="stat-card">
                <strong data-i18n="home.hero.statThreeValue"></strong>
                <span data-i18n="home.hero.statThreeLabel"></span>
              </article>
            </div>
          </div>

          <aside class="hero-panel">
            <span class="panel-tag" data-i18n="home.hero.panelLabel"></span>
            <h2 data-i18n="home.hero.panelTitle"></h2>
            <div class="panel-list">
              <div class="panel-item">
                <span class="panel-index">01</span>
                <p data-i18n="home.hero.panelItemOne"></p>
              </div>
              <div class="panel-item">
                <span class="panel-index">02</span>
                <p data-i18n="home.hero.panelItemTwo"></p>
              </div>
              <div class="panel-item">
                <span class="panel-index">03</span>
                <p data-i18n="home.hero.panelItemThree"></p>
              </div>
            </div>
          </aside>
        </div>
      </section>

      <section class="section manifesto-strip">
        <div class="shell manifesto-card">
          <div class="section-heading compact">
            <span class="eyebrow" data-i18n="home.manifesto.kicker"></span>
            <h2 data-i18n="home.manifesto.title"></h2>
          </div>
          <p class="manifesto-text" data-i18n="home.manifesto.description"></p>
        </div>
      </section>

      <section class="section">
        <div class="shell">
          <div class="section-heading">
            <span class="eyebrow" data-i18n="home.pillars.kicker"></span>
            <h2 data-i18n="home.pillars.title"></h2>
            <p data-i18n="home.pillars.description"></p>
          </div>

          <div class="card-grid">
            <article class="info-card">
              <span class="card-badge">01</span>
              <h3 data-i18n="home.pillars.cardOneTitle"></h3>
              <p data-i18n="home.pillars.cardOneDescription"></p>
            </article>
            <article class="info-card">
              <span class="card-badge">02</span>
              <h3 data-i18n="home.pillars.cardTwoTitle"></h3>
              <p data-i18n="home.pillars.cardTwoDescription"></p>
            </article>
            <article class="info-card">
              <span class="card-badge">03</span>
              <h3 data-i18n="home.pillars.cardThreeTitle"></h3>
              <p data-i18n="home.pillars.cardThreeDescription"></p>
            </article>
          </div>
        </div>
      </section>

      <section class="section section-soft">
        <div class="shell roadmap-layout">
          <div class="section-heading compact">
            <span class="eyebrow" data-i18n="home.roadmap.kicker"></span>
            <h2 data-i18n="home.roadmap.title"></h2>
          </div>

          <div class="timeline">
            <article class="timeline-step">
              <span class="timeline-index">01</span>
              <h3 data-i18n="home.roadmap.stepOneTitle"></h3>
              <p data-i18n="home.roadmap.stepOneDescription"></p>
            </article>
            <article class="timeline-step">
              <span class="timeline-index">02</span>
              <h3 data-i18n="home.roadmap.stepTwoTitle"></h3>
              <p data-i18n="home.roadmap.stepTwoDescription"></p>
            </article>
            <article class="timeline-step">
              <span class="timeline-index">03</span>
              <h3 data-i18n="home.roadmap.stepThreeTitle"></h3>
              <p data-i18n="home.roadmap.stepThreeDescription"></p>
            </article>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="shell">
          <div class="section-heading compact">
            <span class="eyebrow" data-i18n="home.cta.kicker"></span>
            <h2 data-i18n="home.cta.title"></h2>
            <p data-i18n="home.cta.description"></p>
          </div>

          <div class="cta-grid">
            <article class="cta-card cta-card-primary">
              <h3 data-i18n="home.cta.joinTitle"></h3>
              <p data-i18n="home.cta.joinDescription"></p>
              <a href="join.html" data-i18n="actions.join"></a>
            </article>
            <article class="cta-card">
              <h3 data-i18n="home.cta.donationTitle"></h3>
              <p data-i18n="home.cta.donationDescription"></p>
              <a href="donation.html" data-i18n="actions.donate"></a>
            </article>
            <article class="cta-card">
              <h3 data-i18n="home.cta.contactTitle"></h3>
              <p data-i18n="home.cta.contactDescription"></p>
              <a href="contact.html" data-i18n="actions.contact"></a>
            </article>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="shell footer-grid">
        <div>
          <h2 data-i18n="brand.long"></h2>
          <p data-i18n="footer.tagline"></p>
        </div>

        <div>
          <h3 data-i18n="footer.quickLinksTitle"></h3>
          <ul class="footer-links">
            <li><a href="mission.html" data-i18n="nav.mission"></a></li>
            <li><a href="join.html" data-i18n="nav.join"></a></li>
            <li><a href="donation.html" data-i18n="nav.donation"></a></li>
            <li><a href="contact.html" data-i18n="nav.contact"></a></li>
          </ul>
        </div>

        <div>
          <h3 data-i18n="footer.contactTitle"></h3>
          <ul class="footer-links footer-links-compact">
            <li>
              <a href="#" data-config="organization.email" data-config-type="email"></a>
            </li>
            <li>
              <a href="#" data-config="organization.phone" data-config-type="tel"></a>
            </li>
            <li>
              <span data-config="organization.address"></span>
            </li>
          </ul>
          <h3 class="footer-subheading" data-i18n="footer.socialTitle"></h3>
          <ul class="footer-links footer-links-compact">
            <li><a href="#" data-config="organization.social.facebook" data-config-type="url">Facebook</a></li>
            <li><a href="#" data-config="organization.social.instagram" data-config-type="url">Instagram</a></li>
            <li><a href="#" data-config="organization.social.tiktok" data-config-type="url">TikTok</a></li>
            <li><a href="#" data-config="organization.social.x" data-config-type="url">X</a></li>
          </ul>
        </div>
      </div>
    </footer>
  </body>
</html>
